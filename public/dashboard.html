<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuzileOS — Managed Services</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://browser.sentry-cdn.com/7.99.0/bundle.min.js" crossorigin="anonymous"></script>
<script src="sentry-init.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080c14; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #e2e8f0; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); } ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }

#loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; position:relative; overflow:hidden; background: radial-gradient(ellipse at top, #1a1040 0%, #080c14 60%); }
#loginScreen .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%); top:-150px; left:50%; transform:translateX(-50%); pointer-events:none; }
.login-card { background: rgba(255,255,255,0.04); backdrop-filter: blur(32px); border: 1px solid rgba(99,102,241,0.2); border-radius: 24px; padding: 2.5rem; width:100%; max-width:380px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); position:relative; z-index:1; }
.login-logo { width:64px; height:64px; background:linear-gradient(135deg,#6366f1,#4f46e5); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; box-shadow:0 8px 24px rgba(99,102,241,0.4); }
.login-card h1 { font-size:1.5rem; font-weight:900; color:#a5b4fc; text-align:center; letter-spacing:1px; }
.login-card .sub { color:rgba(255,255,255,0.35); font-size:0.82rem; text-align:center; margin-top:0.3rem; margin-bottom:1.75rem; }
.error-msg { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25); color:#f87171; padding:0.7rem 1rem; border-radius:10px; font-size:0.85rem; margin-bottom:1rem; display:none; }

label { color:rgba(99,102,241,0.85); font-size:0.75rem; font-weight:700; display:block; margin-bottom:0.35rem; text-transform:uppercase; letter-spacing:0.06em; }
input, select, textarea { background: rgba(255,255,255,0.04); border: 1px solid rgba(99,102,241,0.2); border-radius: 10px; color: #e2e8f0; padding: 0.7rem 0.9rem; width: 100%; font-size: 0.9rem; outline: none; transition:all 0.2s; }
input:focus, select:focus, textarea:focus { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.06); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
select option { background:#1a1040; color:#e2e8f0; }
.field { margin-bottom:1.1rem; }

.btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); border: none; color: white; font-weight: 700; cursor: pointer; border-radius: 10px; padding: 0.75rem 1.25rem; font-size:0.9rem; transition: all 0.2s; box-shadow: 0 4px 15px rgba(99,102,241,0.35); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.5); }
.btn-secondary { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; font-weight: 600; cursor: pointer; border-radius: 10px; padding: 0.65rem 1.1rem; font-size:0.85rem; transition:all 0.2s; }
.btn-secondary:hover { border-color: rgba(99,102,241,0.4); color: #a5b4fc; }
.btn-danger { background: linear-gradient(135deg,#ef4444,#dc2626); border:none; color:white; font-weight:600; cursor:pointer; border-radius:8px; padding:0.4rem 0.8rem; font-size:0.78rem; }
.btn-success { background: linear-gradient(135deg,#10b981,#059669); border:none; color:white; font-weight:600; cursor:pointer; border-radius:8px; padding:0.4rem 0.8rem; font-size:0.78rem; }

#mainApp { display:none; min-height:100vh; }
nav { background:rgba(8,12,20,0.95); backdrop-filter:blur(20px); border-bottom:1px solid rgba(99,102,241,0.12); padding:0 1.5rem; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.brand { display:flex; align-items:center; gap:0.75rem; }
.brand .logo { width:36px; height:36px; background:linear-gradient(135deg,#6366f1,#4f46e5); border-radius:10px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(99,102,241,0.4); }
.brand .name { font-weight:900; color:#a5b4fc; letter-spacing:1px; font-size:1rem; }
.brand .sub { color:rgba(255,255,255,0.25); font-size:0.72rem; }

.shell { display:flex; min-height:calc(100vh - 60px); }
aside { width:220px; background:rgba(8,12,20,0.8); border-right:1px solid rgba(99,102,241,0.08); padding:1rem; flex-shrink:0; }
.nav-item { display:flex; align-items:center; gap:0.75rem; padding:0.65rem 1rem; border-radius:10px; cursor:pointer; font-size:0.875rem; font-weight:500; color:rgba(255,255,255,0.45); transition:all 0.2s; margin-bottom:0.2rem; }
.nav-item:hover { background:rgba(99,102,241,0.08); color:#a5b4fc; }
.nav-item.active { background:rgba(99,102,241,0.12); color:#a5b4fc; font-weight:700; border-left:3px solid #6366f1; }
.nav-item i { width:18px; text-align:center; }
.nav-section { font-size:0.68rem; font-weight:700; color:rgba(99,102,241,0.4); text-transform:uppercase; letter-spacing:0.08em; padding:0.75rem 1rem 0.3rem; }

main { flex:1; padding:1.5rem; overflow-y:auto; }
.card { background: rgba(255,255,255,0.03); border: 1px solid rgba(99,102,241,0.1); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.p-4{padding:1rem;} .p-5{padding:1.25rem;} .p-6{padding:1.5rem;}
.mb-4{margin-bottom:1rem;} .mb-6{margin-bottom:1.5rem;}

.stat-card { background:rgba(255,255,255,0.03); border:1px solid rgba(99,102,241,0.1); border-radius:14px; padding:1.25rem; transition:all 0.2s; }
.stat-card:hover { border-color:rgba(99,102,241,0.25); transform:translateY(-2px); }
.stat-card .num { font-size:2rem; font-weight:900; color:#a5b4fc; }
.stat-card .lbl { color:rgba(255,255,255,0.3); font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }

.badge { display:inline-block; padding:0.2rem 0.65rem; border-radius:20px; font-size:0.7rem; font-weight:700; }
.badge-green { background:rgba(16,185,129,0.15); color:#34d399; border:1px solid rgba(16,185,129,0.2); }
.badge-red { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
.badge-yellow { background:rgba(245,158,11,0.15); color:#fbbf24; border:1px solid rgba(245,158,11,0.2); }
.badge-blue { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.2); }
.badge-gray { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.08); }

.table-row { display:grid; padding:0.8rem 1rem; border-bottom:1px solid rgba(255,255,255,0.04); align-items:center; font-size:0.875rem; transition:background 0.15s; }
.table-row:hover { background:rgba(99,102,241,0.04); }
.table-head { background:rgba(0,0,0,0.3); border-bottom:1px solid rgba(99,102,241,0.1); font-weight:700; font-size:0.7rem; color:rgba(99,102,241,0.6); text-transform:uppercase; letter-spacing:0.07em; }
.table-head:hover { background:rgba(0,0,0,0.3); }
.section-header { font-size:0.95rem; font-weight:700; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; color:#e2e8f0; }

.client-card { background:rgba(255,255,255,0.03); border:1px solid rgba(99,102,241,0.1); border-radius:16px; padding:1.25rem; margin-bottom:1rem; transition:all 0.2s; }
.client-card:hover { border-color:rgba(99,102,241,0.25); }
.client-card.online { border-left:4px solid #34d399; }
.client-card.offline { border-left:4px solid #f87171; }
.client-card.checking { border-left:4px solid #fbbf24; }

.pulse { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.pulse.green { background:#34d399; box-shadow:0 0 6px #34d399; animation:pulse 2s infinite; }
.pulse.red { background:#f87171; }
.pulse.yellow { background:#fbbf24; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.section { display:none; }
.section.active { display:block; animation:fadeIn 0.25s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; margin-bottom:1.5rem; }

@media(max-width:700px) {
  .two-col,.three-col { grid-template-columns:1fr; }
  aside { position:fixed; left:-240px; top:0; height:100vh; z-index:200; transition:left 0.25s; width:220px; }
  aside.open { left:0; }
  .mob-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:199; }
  .mob-overlay.open { display:block; }
  .mob-burger { display:flex !important; }
}
@media(min-width:701px) { .mob-burger { display:none !important; } .mob-overlay { display:none !important; } }
</style>
</head>
<body>

<div id="loginScreen">
    <div class="glow"></div>
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-shield-halved" style="color:white;font-size:1.4rem;"></i></div>
        <h1>KuzileOS</h1>
        <p class="sub">Managed Services Dashboard</p>
        <div id="errorMsg" class="error-msg"></div>
        <div class="field"><label>Username</label><input id="loginUsername" placeholder="Username"></div>
        <div class="field"><label>PIN</label><input id="loginPin" placeholder="PIN" type="password" inputmode="numeric"></div>
        <button onclick="kzLogin()" class="btn-primary" style="width:100%;"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </div>
</div>

<div id="mainApp">
    <nav>
        <div style="display:flex;align-items:center;gap:0.75rem;">
            <button class="mob-burger btn-secondary" onclick="toggleSidebar()" style="padding:0.4rem 0.7rem;font-size:1rem;display:none;"><i class="fas fa-bars"></i></button>
            <div class="brand">
                <div class="logo"><i class="fas fa-shield-halved" style="color:white;font-size:0.95rem;"></i></div>
                <div><div class="name">KuzileOS</div><div class="sub">by Kuzile Advisory</div></div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;">
            <span id="navUser" style="color:rgba(255,255,255,0.5);font-size:0.82rem;"></span>
            <div id="lastRefresh" style="color:rgba(255,255,255,0.25);font-size:0.75rem;"></div>
            <button onclick="refreshAll()" class="btn-secondary" style="padding:0.4rem 0.85rem;font-size:0.8rem;"><i class="fas fa-rotate"></i> Refresh</button>
            <button onclick="kzLogout()" class="btn-secondary" style="padding:0.4rem 0.85rem;font-size:0.8rem;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>
    <div class="mob-overlay" id="mobOverlay" onclick="toggleSidebar()"></div>
    <div class="shell">
        <aside id="kzSidebar">
            <div class="nav-section">Overview</div>
            <div class="nav-item active" onclick="showSection('overview',this)"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
            <div class="nav-section">Clients</div>
            <div class="nav-item" onclick="showSection('clients',this)"><i class="fas fa-building"></i> All Clients</div>
            <div class="nav-item" onclick="showSection('health',this)"><i class="fas fa-heart-pulse"></i> Health Checks</div>
            <div class="nav-section">Operations</div>
            <div class="nav-item" onclick="showSection('incidents',this)"><i class="fas fa-triangle-exclamation"></i> Incidents</div>
            <div class="nav-item" onclick="showSection('tickets',this)"><i class="fas fa-ticket"></i> Support Tickets</div>
            <div class="nav-section">System</div>
            <div class="nav-item" onclick="showSection('addclient',this)"><i class="fas fa-plus"></i> Add Client</div>
            <div class="nav-section">Projects</div>
            <div class="nav-item" onclick="showSection('projects',this)"><i class="fas fa-diagram-project"></i> Projects</div>
            <div class="nav-item" onclick="showSection('tasks',this)"><i class="fas fa-list-check"></i> All Tasks</div>
            <div class="nav-item" onclick="showSection('bugs',this)"><i class="fas fa-bug"></i> Bug Tracker</div>
            <div class="nav-section">Analytics</div>
            <div class="nav-item" onclick="showSection('analytics',this)"><i class="fas fa-chart-line"></i> Analytics</div>
            <div class="nav-section">Factory</div>
            <div class="nav-item" onclick="showSection('factory',this)"><i class="fas fa-microchip"></i> Software Factory</div>
        </aside>
        <main>
            <div class="section active" id="sec-overview"></div>
            <div class="section" id="sec-clients"></div>
            <div class="section" id="sec-health"></div>
            <div class="section" id="sec-incidents"></div>
            <div class="section" id="sec-tickets"></div>
            <div class="section" id="sec-addclient"></div>
            <div class="section" id="sec-projects"></div>
            <div class="section" id="sec-tasks"></div>
            <div class="section" id="sec-bugs"></div>
            <div class="section" id="sec-project-detail"></div>
            <div class="section" id="sec-analytics"></div>
            <div class="section" id="sec-factory"></div>
            <div class="section" id="sec-module-detail"></div>
        </main>
    </div>
</div>

<script>
let currentUser = null;
let allClients = [];
let healthStatus = {};

function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.style.display='block';}
function hideError(){document.getElementById('errorMsg').style.display='none';}

async function kzLogin(){
    hideError();
    const username=document.getElementById('loginUsername').value.trim().toLowerCase();
    const pin=document.getElementById('loginPin').value.trim();
    if(!username||!pin){showError('Enter username and PIN');return;}
    const email=username+'@kuzileos.local';
    const password='Kuzile-'+username+'-'+pin;
    const {data:authData,error:authError}=await window.sb.auth.signInWithPassword({email,password});
    if(authError||!authData.user){showError('Invalid credentials');return;}
    const {data:profile}=await window.sb.from('kz_staff').select('*').eq('username',username).eq('is_active',true).single();
    if(!profile){showError('Account not active');await window.sb.auth.signOut();return;}
    currentUser=profile;
    initApp();
}

async function kzLogout(){await window.sb.auth.signOut();location.reload();}

async function checkSession(){
    const {data:{session}}=await window.sb.auth.getSession();
    if(!session)return;
    const username=session.user.email.split('@')[0];
    const {data:profile}=await window.sb.from('kz_staff').select('*').eq('username',username).eq('is_active',true).single();
    if(!profile){await window.sb.auth.signOut();return;}
    currentUser=profile;
    initApp();
}

async function initApp(){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('navUser').textContent=currentUser.full_name||currentUser.username;
    await loadClients();
    await runHealthChecks();
    loadOverview();
    setInterval(()=>{runHealthChecks();loadOverview();},60000);
}

function showSection(id,el){ closeSidebar();
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('sec-'+id).classList.add('active');
    if(el)el.classList.add('active');
    if(id==='clients')renderClients();
    if(id==='health')renderHealth();
    if(id==='incidents')loadIncidents();
    if(id==='tickets')loadTickets();
    if(id==='addclient')renderAddClient();
    if(id==='projects')loadProjects();
    if(id==='tasks')loadAllTasks();
    if(id==='bugs')loadAllBugs();
    if(id==='analytics')loadAnalytics();
    if(id==='factory')loadFactory();
}

async function loadClients(){
    const {data}=await window.sb.from('kz_clients').select('*').order('name');
    allClients=data||[];
}

async function runHealthChecks(){
    document.getElementById('lastRefresh').textContent='Checking...';
    const checks=allClients.map(async client=>{
        if(!client.platform_url){healthStatus[client.id]={status:'unknown',ms:null};return;}
        const start=Date.now();
        try{
            const res=await fetch(client.platform_url,{method:'HEAD',mode:'no-cors',signal:AbortSignal.timeout(8000)});
            const ms=Date.now()-start;
            healthStatus[client.id]={status:'online',ms};
            await window.sb.from('kz_health_checks').insert([{client_id:client.id,status:'online',response_time_ms:ms,status_code:200}]);
        }catch(e){
            const ms=Date.now()-start;
            healthStatus[client.id]={status:'offline',ms,error:e.message};
            await window.sb.from('kz_health_checks').insert([{client_id:client.id,status:'offline',response_time_ms:ms,error_message:e.message}]);
        }
    });
    await Promise.all(checks);
    document.getElementById('lastRefresh').textContent='Last check: '+new Date().toLocaleTimeString('en-ZA');
}

async function refreshAll(){
    await loadClients();
    await runHealthChecks();
    loadOverview();
    const active=document.querySelector('.nav-item.active');
    const section=document.querySelector('.section.active');
    if(section&&section.id==='sec-clients')renderClients();
    if(section&&section.id==='sec-health')renderHealth();
}

async function loadOverview(){
    const online=Object.values(healthStatus).filter(h=>h.status==='online').length;
    const offline=Object.values(healthStatus).filter(h=>h.status==='offline').length;
    const {data:openInc}=await window.sb.from('kz_incidents').select('id').eq('status','open');
    const {data:openTix}=await window.sb.from('kz_tickets').select('id').eq('status','open');

    document.getElementById('sec-overview').innerHTML=`
    <div style="margin-bottom:1.5rem;">
        <h2 style="font-size:1.3rem;font-weight:900;color:#a5b4fc;">Command Center</h2>
        <p style="color:rgba(255,255,255,0.3);font-size:0.85rem;">${new Date().toLocaleDateString('en-ZA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><p class="lbl">Total Clients</p><p class="num">${allClients.length}</p></div>
        <div class="stat-card"><p class="lbl">Online</p><p class="num" style="color:#34d399;">${online}</p></div>
        <div class="stat-card"><p class="lbl">Offline</p><p class="num" style="color:#f87171;">${offline}</p></div>
        <div class="stat-card"><p class="lbl">Open Incidents</p><p class="num" style="color:#fbbf24;">${(openInc||[]).length}</p></div>
        <div class="stat-card"><p class="lbl">Open Tickets</p><p class="num" style="color:#a5b4fc;">${(openTix||[]).length}</p></div>
    </div>
    <div style="margin-bottom:1rem;"><h3 style="font-size:1rem;font-weight:700;margin-bottom:1rem;color:#e2e8f0;"><i class="fas fa-heart-pulse" style="color:#a5b4fc;margin-right:0.5rem;"></i>Client Status</h3>
    ${allClients.map(c=>{
        const h=healthStatus[c.id]||{status:'checking'};
        const statusClass=h.status==='online'?'online':h.status==='offline'?'offline':'checking';
        const pulseClass=h.status==='online'?'green':h.status==='offline'?'red':'yellow';
        return `<div class="client-card ${statusClass}" onclick="showSection('clients',document.querySelector('[onclick*=clients]'))">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <span class="pulse ${pulseClass}"></span>
                    <div>
                        <p style="font-weight:700;">${c.name}</p>
                        <p style="font-size:0.78rem;color:rgba(255,255,255,0.35);">${c.platform_url||'No URL set'}</p>
                    </div>
                </div>
                <div style="text-align:right;">
                    <span class="badge badge-${h.status==='online'?'green':h.status==='offline'?'red':'yellow'}">${h.status}</span>
                    ${h.ms?`<p style="font-size:0.72rem;color:rgba(255,255,255,0.25);margin-top:0.25rem;">${h.ms}ms</p>`:''}
                </div>
            </div>
        </div>`;
    }).join('')}
    </div>`;
}

function renderClients(){
    document.getElementById('sec-clients').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <div><h2 style="font-size:1.3rem;font-weight:900;color:#a5b4fc;">All Clients</h2><p style="color:rgba(255,255,255,0.3);font-size:0.85rem;">${allClients.length} managed platforms</p></div>
        <button onclick="showSection('addclient',document.querySelector('[onclick*=addclient]'))" class="btn-primary"><i class="fas fa-plus"></i> Add Client</button>
    </div>
    ${allClients.map(c=>{
        const h=healthStatus[c.id]||{status:'unknown'};
        return `<div class="client-card ${h.status==='online'?'online':h.status==='offline'?'offline':'checking'}" style="margin-bottom:1rem;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;">
                <div>
                    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.25rem;">
                        <span class="pulse ${h.status==='online'?'green':h.status==='offline'?'red':'yellow'}"></span>
                        <h3 style="font-weight:800;font-size:1rem;">${c.name}</h3>
                        <span class="badge badge-${c.status==='active'?'green':'gray'}">${c.status}</span>
                    </div>
                    <p style="font-size:0.78rem;color:rgba(255,255,255,0.35);margin-left:1.1rem;">${c.short_code} • ${c.tier}</p>
                </div>

async function viewProject(id) {
    const { data: project } = await window.sb.from('kz_projects').select('*,kz_clients(name)').eq('id',id).single();
    if (!project) return;
    activeProject = project;
    const [mRes,tRes,bRes,rRes] = await Promise.all([
        window.sb.from('kz_milestones').select('*').eq('project_id',id).order('due_date'),
        window.sb.from('kz_tasks').select('*').eq('project_id',id).order('created_at',{ascending:false}),
        window.sb.from('kz_bugs').select('*').eq('project_id',id).order('created_at',{ascending:false}),
        window.sb.from('kz_releases').select('*').eq('project_id',id).order('release_date',{ascending:false})
    ]);
    cachedMilestones = mRes.data||[];
    cachedTasks = tRes.data||[];
    cachedBugs = bRes.data||[];
    cachedReleases = rRes.data||[];
    renderProjectDetail(activeProject, cachedMilestones, cachedTasks, cachedBugs, cachedReleases, 'overview');
}

}

function taskCard(t, projectId) {
    return `<div class="card p-4 mb-4" style="border-left:3px solid ${t.priority==='critical'?'#f87171':t.priority==='high'?'#fbbf24':t.priority==='medium'?'#6366f1':'#34d399'};">
        <p style="font-weight:700;font-size:0.875rem;margin-bottom:0.4rem;">${t.title}</p>
        ${t.description?`<p style="font-size:0.75rem;color:rgba(255,255,255,0.35);margin-bottom:0.4rem;">${t.description.substring(0,60)}${t.description.length>60?'...':''}</p>`:''}
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:0.72rem;color:rgba(255,255,255,0.3);">${t.assignee||'Unassigned'}</span>
            ${t.status!=='done'?`<button onclick="completeTask('${t.id}','${projectId}')" class="btn-success" style="padding:0.15rem 0.4rem;font-size:0.65rem;"><i class="fas fa-check"></i></button>`:'<span style="color:#34d399;font-size:0.72rem;"><i class="fas fa-check"></i> Done</span>'}
        </div>
    </div>`;
}

async function addTask(projectId) {
    const title = document.getElementById('tkTitle').value.trim();
    if (!title) { alert('Title required'); return; }
    const { error } = await window.sb.from('kz_tasks').insert([{
        project_id: projectId,
        title,
        description: document.getElementById('tkDesc').value.trim(),
        priority: document.getElementById('tkPri').value,
        status: document.getElementById('tkStatus').value,
        assignee: document.getElementById('tkAssignee').value.trim(),
        due_date: document.getElementById('tkDue').value||null
    }]);
    if (error) { alert('Error: '+error.message); return; }
    await viewProject(projectId);
    switchProjectTab('tasks');
}

async function completeTask(taskId, projectId) {
    await window.sb.from('kz_tasks').update({status:'done',completed_at:new Date().toISOString()}).eq('id',taskId);
    await viewProject(projectId);
    switchProjectTab('tasks');
}

async function renderAnalytics(selectedClientId=null) {
    // Layer 1 — KuzileOS own data
    const [hcRes, incRes, tixRes, projRes] = await Promise.all([
        window.sb.from('kz_health_checks').select('status,checked_at,client_id').order('checked_at',{ascending:false}).limit(500),
        window.sb.from('kz_incidents').select('status,severity,created_at,client_id').order('created_at',{ascending:false}),
        window.sb.from('kz_tickets').select('status,priority,created_at,client_id').order('created_at',{ascending:false}),
        window.sb.from('kz_projects').select('status,client_id').order('created_at',{ascending:false})
    ]);

    const hc = hcRes.data||[];
    const incidents = incRes.data||[];
    const tickets = tixRes.data||[];
    const projects = projRes.data||[];

    // Uptime per client
    const uptimeByClient = {};
    allClients.forEach(c => {
        const clientHc = hc.filter(h=>h.client_id===c.id);
        const uptime = clientHc.length>0?Math.round((clientHc.filter(h=>h.status==='online').length/clientHc.length)*100):null;
        uptimeByClient[c.id] = {name:c.name, uptime, checks:clientHc.length};
    });

    // Incidents last 30 days
    const thirtyDaysAgo = new Date(Date.now()-30*24*60*60*1000).toISOString();
    const recentInc = incidents.filter(i=>i.created_at>=thirtyDaysAgo);
    const recentTix = tickets.filter(t=>t.created_at>=thirtyDaysAgo);

    // Build client selector
    const clientOptions = allClients.filter(c=>c.supabase_anon_key&&c.supabase_project_id).map(c=>
        `<option value="${c.id}" ${c.id===selectedClientId?'selected':''}>${c.name}</option>`
    ).join('');

    let clientAnalyticsHTML = '';
    if (selectedClientId) {
        const client = allClients.find(c=>c.id===selectedClientId);
        if (client&&client.supabase_anon_key&&client.supabase_project_id) {
            clientAnalyticsHTML = await fetchClientAnalytics(client);
        }
    }

    document.getElementById('analyticsContent').innerHTML = `
    <div class="stats-grid" style="margin-bottom:1.5rem;">
        <div class="stat-card"><p class="lbl">Total Health Checks</p><p class="num">${hc.length}</p></div>
        <div class="stat-card"><p class="lbl">Incidents (30d)</p><p class="num" style="color:#f87171;">${recentInc.length}</p></div>
        <div class="stat-card"><p class="lbl">Tickets (30d)</p><p class="num" style="color:#fbbf24;">${recentTix.length}</p></div>
        <div class="stat-card"><p class="lbl">Active Projects</p><p class="num" style="color:#34d399;">${projects.filter(p=>p.status==='active').length}</p></div>
    </div>

    <div class="two-col" style="margin-bottom:1.5rem;">
        <div class="card p-5">
            <div class="section-header"><i class="fas fa-heart-pulse" style="color:#a5b4fc;"></i> Uptime by Client</div>
            ${Object.values(uptimeByClient).map(c=>`
            <div style="margin-bottom:0.75rem;">
                <div style="display:flex;justify-content:space-between;margin-bottom:0.3rem;">
                    <span style="font-size:0.85rem;">${c.name}</span>
                    <span style="font-weight:700;color:${c.uptime>=90?'#34d399':c.uptime>=70?'#fbbf24':'#f87171'};">${c.uptime!==null?c.uptime+'%':'No data'}</span>
                </div>
                <div style="background:rgba(255,255,255,0.06);border-radius:4px;height:6px;overflow:hidden;">
                    <div style="background:${c.uptime>=90?'#34d399':c.uptime>=70?'#fbbf24':'#f87171'};height:100%;width:${c.uptime||0}%;border-radius:4px;"></div>
                </div>
                <p style="font-size:0.7rem;color:rgba(255,255,255,0.25);margin-top:0.2rem;">${c.checks} checks recorded</p>
            </div>`).join('')}
        </div>

        <div class="card p-5">
            <div class="section-header"><i class="fas fa-triangle-exclamation" style="color:#f87171;"></i> Incident Severity Breakdown</div>
            ${['critical','high','medium','low'].map(sev=>{
                const count = incidents.filter(i=>i.severity===sev).length;
                const pct = incidents.length>0?Math.round((count/incidents.length)*100):0;
                return `<div style="margin-bottom:0.75rem;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:0.3rem;">
                        <span class="badge badge-${sev==='critical'||sev==='high'?'red':sev==='medium'?'yellow':'blue'}">${sev}</span>
                        <span style="font-weight:700;">${count} <span style="color:rgba(255,255,255,0.3);font-weight:400;">(${pct}%)</span></span>
                    </div>
                    <div style="background:rgba(255,255,255,0.06);border-radius:4px;height:5px;overflow:hidden;">
                        <div style="background:${sev==='critical'||sev==='high'?'#f87171':sev==='medium'?'#fbbf24':'#a5b4fc'};height:100%;width:${pct}%;border-radius:4px;"></div>
                    </div>
                </div>`;
            }).join('')}
            <div style="margin-top:1rem;padding-top:0.75rem;border-top:1px solid rgba(255,255,255,0.06);">
                <div style="display:flex;justify-content:space-between;font-size:0.82rem;">
                    <span style="color:rgba(255,255,255,0.4);">Open tickets</span><span style="color:#fbbf24;">${tickets.filter(t=>t.status==='open').length}</span>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-top:0.4rem;">
                    <span style="color:rgba(255,255,255,0.4);">Resolved tickets</span><span style="color:#34d399;">${tickets.filter(t=>t.status==='resolved').length}</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card p-5 mb-6">
        <div class="section-header"><i class="fas fa-chart-bar" style="color:#a5b4fc;"></i> Per-Client Live Analytics</div>
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;">
            <select id="clientAnalyticsSelect" style="width:auto;" onchange="renderAnalytics(this.value||null)">
                <option value="">Select a client...</option>${clientOptions}
            </select>
            <p style="font-size:0.78rem;color:rgba(255,255,255,0.3);">Connects live to the client's Supabase instance</p>
        </div>
        ${selectedClientId?clientAnalyticsHTML:'<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.2);">Select a client above to view their live platform data</div>'}
    </div>`;
}

async function fetchClientAnalytics(client) {
    try {
        const url = 'https://'+client.supabase_project_id+'.supabase.co';
        const sb2 = supabase.createClient(url, client.supabase_anon_key);
        let html = '';

        if (client.platform_type==='lota') {
            const [mRes,dRes,vRes,qRes,attRes,incRes,compRes] = await Promise.all([
                sb2.from('lota_members').select('id,status'),
                sb2.from('lota_drivers').select('id,status'),
                sb2.from('lota_vehicles').select('id,status'),
                sb2.from('lota_queue').select('id,status,departed_at').eq('status','departed').gte('departed_at',new Date(Date.now()-30*24*60*60*1000).toISOString()),
                sb2.from('lota_attendance').select('status,date').gte('date',new Date(Date.now()-7*24*60*60*1000).toISOString().split('T')[0]),
                sb2.from('lota_incidents').select('id,status'),
                sb2.from('lota_complaints').select('id,status')
            ]);
            const members=mRes.data||[], drivers=dRes.data||[], vehicles=vRes.data||[];
            const trips=qRes.data||[], att=attRes.data||[], incidents=incRes.data||[], complaints=compRes.data||[];
            const attRate=att.length>0?Math.round((att.filter(a=>a.status==='present').length/att.length)*100):null;
            html = `<div class="stats-grid">
                <div class="stat-card"><p class="lbl">Active Members</p><p class="num">${members.filter(m=>m.status==='active').length}</p></div>
                <div class="stat-card"><p class="lbl">Active Drivers</p><p class="num">${drivers.filter(d=>d.status==='active').length}</p></div>
                <div class="stat-card"><p class="lbl">Active Vehicles</p><p class="num">${vehicles.filter(v=>v.status==='active').length}</p></div>
                <div class="stat-card"><p class="lbl">Trips (30d)</p><p class="num" style="color:#00d4b4;">${trips.length}</p></div>
                <div class="stat-card"><p class="lbl">Attendance (7d)</p><p class="num" style="color:${attRate>=80?'#34d399':'#fbbf24'};">${attRate!==null?attRate+'%':'—'}</p></div>
                <div class="stat-card"><p class="lbl">Open Incidents</p><p class="num" style="color:#f87171;">${incidents.filter(i=>i.status==='open').length}</p></div>
                <div class="stat-card"><p class="lbl">Complaints</p><p class="num" style="color:#fbbf24;">${complaints.length}</p></div>
            </div>`;
        } else if (client.platform_type==='educonnect') {
            const [lRes,attRes,feeRes,discRes,hwRes,assessRes] = await Promise.all([
                sb2.from('ec_learners').select('id,status'),
                sb2.from('ec_attendance').select('status,date').gte('date',new Date(Date.now()-7*24*60*60*1000).toISOString().split('T')[0]),
                sb2.from('ec_fees').select('amount,status'),
                sb2.from('ec_behaviour_records').select('id,record_type').gte('created_at',new Date(Date.now()-30*24*60*60*1000).toISOString()),
                sb2.from('ec_homework').select('id,status'),
                sb2.from('ec_assessments').select('percentage')
            ]);
            const learners=lRes.data||[], att=attRes.data||[], fees=feeRes.data||[];
            const disc=discRes.data||[], hw=hwRes.data||[], assess=assessRes.data||[];
            const attRate=att.length>0?Math.round((att.filter(a=>a.status==='present').length/att.length)*100):null;
            const totalFees=fees.reduce((s,f)=>s+parseFloat(f.amount||0),0);
            const collectedFees=fees.filter(f=>f.status==='paid').reduce((s,f)=>s+parseFloat(f.amount||0),0);
            const avgMark=assess.length>0?Math.round(assess.reduce((s,a)=>s+parseFloat(a.percentage||0),0)/assess.length):null;
            html = `<div class="stats-grid">
                <div class="stat-card"><p class="lbl">Active Learners</p><p class="num">${learners.filter(l=>l.status==='active').length}</p></div>
                <div class="stat-card"><p class="lbl">Attendance (7d)</p><p class="num" style="color:${attRate>=80?'#34d399':'#fbbf24'};">${attRate!==null?attRate+'%':'—'}</p></div>
                <div class="stat-card"><p class="lbl">Fee Collection</p><p class="num" style="color:#34d399;">R${collectedFees.toFixed(0)}</p></div>
                <div class="stat-card"><p class="lbl">Outstanding</p><p class="num" style="color:#f87171;">R${(totalFees-collectedFees).toFixed(0)}</p></div>
                <div class="stat-card"><p class="lbl">Avg Mark</p><p class="num" style="color:#a5b4fc;">${avgMark!==null?avgMark+'%':'—'}</p></div>
                <div class="stat-card"><p class="lbl">Incidents (30d)</p><p class="num" style="color:#fbbf24;">${disc.filter(d=>d.record_type!=='award').length}</p></div>
                <div class="stat-card"><p class="lbl">Active Homework</p><p class="num">${hw.filter(h=>h.status==='active').length}</p></div>
            </div>`;
        } else if (client.platform_type==='cordesa') {
            const [tripRes,taxiRes,assocRes] = await Promise.all([
                sb2.from('cordesa_trips').select('fee_charged,trip_type,created_at').gte('created_at',new Date(Date.now()-30*24*60*60*1000).toISOString()),
                sb2.from('cordesa_taxis').select('id,association_code'),
                sb2.from('associations').select('id,name,code')
            ]);
            const trips=tripRes.data||[], taxis=taxiRes.data||[], assocs=assocRes.data||[];
            const totalFees=trips.reduce((s,t)=>s+parseFloat(t.fee_charged||0),0);
            const byType={};
            trips.forEach(t=>{byType[t.trip_type]=(byType[t.trip_type]||0)+1;});
            html = `<div class="stats-grid">
                <div class="stat-card"><p class="lbl">Trips (30d)</p><p class="num" style="color:#00c878;">${trips.length}</p></div>
                <div class="stat-card"><p class="lbl">Revenue (30d)</p><p class="num" style="color:#34d399;">R${totalFees.toFixed(0)}</p></div>
                <div class="stat-card"><p class="lbl">Total Taxis</p><p class="num">${taxis.length}</p></div>
                <div class="stat-card"><p class="lbl">Associations</p><p class="num">${assocs.length}</p></div>
            </div>
            <div style="margin-top:1rem;"><p style="font-size:0.78rem;color:rgba(255,255,255,0.3);margin-bottom:0.5rem;">Trip Types (30d)</p>
            ${Object.entries(byType).map(([type,count])=>`<div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.85rem;"><span>${type}</span><span class="badge badge-blue">${count}</span></div>`).join('') || '<p style="color:rgba(255,255,255,0.2);font-size:0.82rem;">No trips in last 30 days</p>'}
            </div>`;
        } else {
            html = '<p style="color:rgba(255,255,255,0.3);font-size:0.875rem;">No analytics template available for this platform type yet.</p>';
        }
        return html;
    } catch(e) {
        return `<div style="color:#f87171;font-size:0.85rem;"><i class="fas fa-exclamation-circle"></i> Failed to connect to client platform: ${e.message}</div>`;
    }
}


let allModules = [];
let clientModules = {};

async function loadFactory() {
    const { data: modules } = await window.sb.from('kz_modules').select('*').eq('is_active', true).order('category').order('name');
    allModules = modules||[];
    const { data: deployments } = await window.sb.from('kz_client_modules').select('*,kz_clients(name,short_code)');
    clientModules = {};
    (deployments||[]).forEach(d => {
        if (!clientModules[d.module_id]) clientModules[d.module_id] = [];
        clientModules[d.module_id].push(d.kz_clients);
    });
    renderFactory();
}

function renderFactory(filterCategory='all', searchTerm='') {
    const categories = [...new Set(allModules.map(m=>m.category))].sort();
    let filtered = allModules;
    if (filterCategory !== 'all') filtered = filtered.filter(m=>m.category===filterCategory);
    if (searchTerm) filtered = filtered.filter(m=>m.name.toLowerCase().includes(searchTerm.toLowerCase())||m.description.toLowerCase().includes(searchTerm.toLowerCase()));

    const totalDeployments = Object.values(clientModules).reduce((s,arr)=>s+arr.length,0);

    document.getElementById('sec-factory').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <div><h2 style="font-size:1.3rem;font-weight:900;color:#a5b4fc;">Software Factory</h2><p style="color:rgba(255,255,255,0.3);font-size:0.85rem;">Reusable module library for client projects</p></div>
    </div>
    <div class="stats-grid" style="margin-bottom:1.5rem;">
        <div class="stat-card"><p class="lbl">Total Modules</p><p class="num">${allModules.length}</p></div>
        <div class="stat-card"><p class="lbl">Categories</p><p class="num">${categories.length}</p></div>
        <div class="stat-card"><p class="lbl">Total Deployments</p><p class="num" style="color:#34d399;">${totalDeployments}</p></div>
        <div class="stat-card"><p class="lbl">Clients Using Factory</p><p class="num" style="color:#a5b4fc;">${allClients.length}</p></div>
    </div>

    <div class="card p-4 mb-6">
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
            <input id="moduleSearch" placeholder="Search modules..." style="max-width:220px;" oninput="renderFactory(document.getElementById('catFilter').value,this.value)">
            <select id="catFilter" style="width:auto;" onchange="renderFactory(this.value,document.getElementById('moduleSearch').value)">
                <option value="all">All Categories</option>
                ${categories.map(c=>`<option value="${c}" ${c===filterCategory?'selected':''}>${c}</option>`).join('')}
            </select>
            <span style="font-size:0.78rem;color:rgba(255,255,255,0.3);">${filtered.length} modules</span>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;">
    ${filtered.map(m => {
        const deployed = clientModules[m.id]||[];
        return `<div class="card p-5" style="cursor:pointer;transition:all 0.2s;border-top:3px solid ${categoryColor(m.category)};" onclick="viewModule('${m.id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="fas ${m.icon||'fa-puzzle-piece'}" style="color:#a5b4fc;font-size:0.9rem;"></i>
                    </div>
                    <div>
                        <p style="font-weight:800;font-size:0.9rem;">${m.name}</p>
                        <span style="font-size:0.65rem;font-weight:700;color:${categoryColor(m.category)};text-transform:uppercase;">${m.category}</span>
                    </div>
                </div>
                <span class="badge badge-${deployed.length>0?'green':'gray'}">${deployed.length} deployed</span>
            </div>
            <p style="font-size:0.78rem;color:rgba(255,255,255,0.45);line-height:1.5;margin-bottom:0.75rem;">${m.description}</p>
            ${deployed.length>0?`<div style="display:flex;flex-wrap:wrap;gap:0.3rem;">${deployed.map(c=>`<span class="badge badge-blue">${c?.short_code||'?'}</span>`).join('')}</div>`:'<span style="font-size:0.72rem;color:rgba(255,255,255,0.2);">Not yet deployed</span>'}
        </div>`;
    }).join('')}

function categoryColor(cat) {
    const colors = {
        'Core':'#6366f1','Operations':'#00d4b4','Administration':'#60a5fa',
        'Finance':'#34d399','Compliance':'#fbbf24','Analytics':'#a5b4fc',
        'Public':'#f87171','Academic':'#fb923c'
    };
    return colors[cat]||'#a5b4fc';
}

async function deployModule(moduleId) {
    const clientId = document.getElementById('deployTarget').value;
    if (!clientId) { alert('Select a client first'); return; }
    const { error } = await window.sb.from('kz_client_modules').insert([{
        client_id: clientId,
        module_id: moduleId,
        status: 'deployed'
    }]);
    if (error) { alert('Error: '+error.message); return; }
    await loadFactory();
    viewModule(moduleId);
}
